# Custom overrides for Kanagawa Lotus theme (light mirror of kanagawa-custom.conf)
include kanagawa-lotus.conf

tab_bar_background #d5cea3
active_tab_foreground #f2ecbc
active_tab_background #4d699b
active_tab_font_style bold

# Override kitty's default green active border (conflicts with vim git-gutter add markers)
active_border_color #8a8980
inactive_border_color #d5cea3

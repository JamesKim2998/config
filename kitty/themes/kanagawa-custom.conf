# Custom overrides for Kanagawa theme
include kanagawa.conf

tab_bar_background #16161d
active_tab_foreground #16161d
active_tab_background #7e9cd8
active_tab_font_style bold

# Override kitty's default green active border (conflicts with vim git-gutter add markers)
active_border_color #727169
inactive_border_color #363646

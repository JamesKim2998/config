include themes/kanagawa-custom.conf

# Appearance
font_size 13.0
# Dim inactive panes' text to emphasize the active one
inactive_text_alpha 0.3
# Small breathing room between border and text
window_padding_width 2
# Hide titlebar but keep traffic-light buttons (macOS)
hide_window_decorations titlebar-only

# Active-pane framing: thick border on all 4 sides (vs default 0.5pt seam-only)
window_border_width 2pt
draw_minimal_borders no

# Cursor: beam by default, block in vim normal mode (handled by nvim's guicursor)
cursor_shape beam

enabled_layouts splits
watcher equalize.py

# Copy to clipboard merely by selecting text (like standard Linux terminals)
copy_on_select   yes

# Don't add newlines for soft-wrapped lines when copying
strip_trailing_spaces smart

# Send <M-x> instead of special chars (e.g., ∆ for opt+j)
macos_option_as_alt yes

map cmd+return launch --location=vsplit --cwd=current
map cmd+t new_tab_with_cwd
map ctrl+shift+- launch --location=hsplit --cwd=current
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+e kitten equalize.py  # equalize split sizes

# cmd+w closes the current pane and re-equalizes the layout.
# (combine ensures equalize runs AFTER close so it sees the post-removal tree —
# more reliable than the equalize.py watcher's on_close hook.)
map cmd+w combine : close_window : kitten equalize.py
map cmd+shift+w close_os_window

# Switch tabs by number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6

# Switch windows by number
map alt+1 nth_window 0
map alt+2 nth_window 1
map alt+3 nth_window 2
map alt+4 nth_window 3
map alt+5 nth_window 4
map alt+6 nth_window 5

# Claude Code: newline without submit
map shift+enter send_text all \e\r

# Tab bar: show directory name, darker bg for visual separation.
# Bell: yellow override (kitty has no dedicated bell color); inserted only when active so no-bell layout is unchanged.
tab_title_template " {'󰎤󰎧󰎪󰎭󰎱󰎳󰎶󰎹󰎼'[index-1] if index <= 9 else index} {title.split('/')[-1]:<6}{(' ' + fmt.fg._dca561 + bell_symbol + fmt.fg.default) if bell_symbol else ''}  "
tab_bar_style separator
tab_separator "┃"
# Always show the tab bar, even with a single tab
tab_bar_min_tabs 1
# Show a bell icon on the tab when a background tab fires a bell (e.g. build done).
# enable_audio_bell=no silences the system beep; tab indicator remains.
enable_audio_bell no
# Just the glyph — padding/color handled by tab_title_template above
bell_on_tab ""

# Send Ctrl+I as distinct from Tab (for nvim jump forward)
map ctrl+i send_text all \x1b[105;5u

# Seamless navigation between kitty splits and nvim splits using ctrl+hjkl.
# Requires: knubie/vim-kitty-navigator plugin in nvim.
allow_remote_control yes
listen_on unix:/tmp/mykitty
map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+l kitten pass_keys.py right  ctrl+l

# Remap scroll page up/down to Ctrl+Shift+U/D (vim style)
map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down

# Scrollback with vim keybindings (kitty-scrollback.nvim)
# Ctrl+Shift+H: browse scrollback in nvim
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map ctrl+shift+h kitty_scrollback_nvim


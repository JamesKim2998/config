promptToReturnFromSubprocess: false
os:
  # Opens files in existing nvim instance (when running lazygit inside nvim terminal)
  editPreset: nvim-remote
gui:
  filterMode: fuzzy
  nerdFontsVersion: "3"
git:
  # Highest-frequency background offender — leaks .git/index.lock under contention
  # (shared submodule git-dirs in worktree-pool slots). Manual refresh: `R` in lazygit.
  autoRefresh: false
  pagers:
    - pager: delta --dark --paging=never
keybinding:
  universal:
    openDiffTool: '<disabled>' # default <c-t> too easy to trigger accidentally (launches nvimdiff)
customCommands:
  - key: 'y'
    context: 'files, commitFiles'
    command: 'yazi {{.SelectedPath | quote}}'
    output: terminal

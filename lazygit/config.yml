promptToReturnFromSubprocess: false
os:
  # Opens files in existing nvim instance (when running lazygit inside nvim terminal)
  editPreset: nvim-remote
gui:
  filterMode: fuzzy
  nerdFontsVersion: "3"
git:
  pagers:
    - pager: delta --dark --paging=never
keybinding:
  universal:
    openDiffTool: '<disabled>'  # default <c-t> too easy to trigger accidentally (launches nvimdiff)
customCommands:
  - key: 'y'
    context: 'files'
    command: 'yazi {{.SelectedFile.Name | quote}}'
    output: terminal
  - key: 'y'
    context: 'commitFiles'
    command: 'yazi {{.SelectedCommitFile.Name | quote}}'
    output: terminal
